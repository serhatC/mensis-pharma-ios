name: MensisPharmApp
options:
  bundleIdPrefix: com.mensispharma
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.mensispharma.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "Mensis Pharma"
    INFOPLIST_KEY_UILaunchStoryboardName: ""
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"

targets:
  MensisPharmApp:
    type: application
    platform: iOS
    sources:
      - path: MensisPharmApp
        excludes:
          - "**/*.md"
    dependencies:
      - sdk: MessageUI.framework
    info:
      path: MensisPharmApp/Info.plist
      properties:
        CFBundleDisplayName: "Mensis Pharma"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        NSContactsUsageDescription: ""
        NSPhotoLibraryUsageDescription: ""
